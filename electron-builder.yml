appId: com.anndunkin.addressbook
productName: Address Book
copyright: Copyright © 2026 anndunkin

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - package.json
  # DATA FILE NOTE: master-contacts.json is included in v1.0.0 (first release) only.
  # Remove from the files array for all future releases — users manage their own data.
  - data/master-contacts.json

extraResources:
  - from: data
    to: data
    filter:
      - "**/*"

win:
  target: nsis
  icon: assets/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Address Book

publish: null
